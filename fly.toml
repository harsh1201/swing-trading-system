# fly.toml configuration for Fly.io deployment
# 
# Usage:
# 1. Install flyctl: https://fly.io/docs/hands-on/install-flyctl/
# 2. Run 'fly launch' to initialize (don't overwrite this file if asked)
# 3. Set secrets for Discord webhooks:
#    fly secrets set DISCORD_WEBHOOK_URL="..." DISCORD_LONG_WEBHOOK_URL="..." DISCORD_SHORT_WEBHOOK_URL="..."
# 4. Deploy: fly deploy

app = "swing-trading-system"
primary_region = "bom" # Mumbai region for low latency to NSE data

[build]
  dockerfile = "Dockerfile"

[env]
  LIVE_MODE = "True"

# Persistent storage for tracked trades (portfolio.json)
[mounts]
  source = "swing_data"
  destination = "/app/data"

# Standard process running our background scheduler
[processes]
  app = "python -u scheduler.py"
